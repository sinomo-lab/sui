<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SUI Logo Preview</title>
    <link rel="icon" type="image/svg+xml" href="../../crates/sui-runtime/assets/sui-logo.svg" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #10141a;
        color: #e9f0f6;
      }

      main {
        width: min(960px, calc(100vw - 48px));
        display: grid;
        gap: 28px;
      }

      .swatches {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .surface {
        min-height: 260px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .surface.dark {
        background: #0c1118;
      }

      .surface.light {
        background: #f6f8fb;
      }

      .surface.blue {
        background: #0b355c;
      }

      .large {
        width: 180px;
        height: 180px;
      }

      .small {
        width: 48px;
        height: 48px;
      }

      .wordmark {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 44px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .surface.light .wordmark {
        color: #10141a;
      }

      @media (max-width: 760px) {
        .swatches {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="swatches">
        <div class="surface dark">
          <img class="large" src="../../crates/sui-runtime/assets/sui-logo.svg" alt="SUI logo on dark background" />
        </div>
        <div class="surface light">
          <img class="large" src="../../crates/sui-runtime/assets/sui-logo.svg" alt="SUI logo on light background" />
        </div>
        <div class="surface blue">
          <img class="large" src="../../crates/sui-runtime/assets/sui-logo.svg" alt="SUI logo on blue background" />
        </div>
      </div>
      <div class="surface light">
        <div class="wordmark">
          <img class="small" src="../../crates/sui-runtime/assets/sui-logo.svg" alt="" />
          <span>sui</span>
        </div>
      </div>
    </main>
  </body>
</html>
