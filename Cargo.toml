[workspace]
resolver = "3"

members = [
    "crates/*",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.90"
version = "0.1.0"

[profile.release]
opt-level = 2
panic = "abort"

[profile.dev]

[profile.dev.package."*"]
opt-level = 2

[workspace.dependencies]
bytemuck = { version = "1", features = ["derive"] }
pollster = "0.4"
sui = { path = "crates/sui" }
sui-core = { path = "crates/sui-core" }
sui-dev = { path = "crates/sui-dev" }
sui-layout = { path = "crates/sui-layout" }
sui-platform = { path = "crates/sui-platform" }
sui-render-wgpu = { path = "crates/sui-render-wgpu" }
sui-runtime = { path = "crates/sui-runtime" }
sui-scene = { path = "crates/sui-scene" }
wgpu = "29.0.1"
winit = "0.30.13"
