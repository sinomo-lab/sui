[workspace]
resolver = "3"

members = [
    "crates/*",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.90"
version = "0.1.0"

[profile.release]
opt-level = 2
panic = "abort"

[profile.dev]
opt-level = 2

[profile.dev.package."*"]
opt-level = 2

[workspace.dependencies]
avif-serialize = "0.8.8"
bytemuck = { version = "1", features = ["derive"] }
cosmic-text = "0.18.2"
rav1e = { version = "0.8.1", default-features = false, features = ["threading"] }
resvg = { version = "0.47", default-features = false }
fontdb = "0.23"
js-sys = "0.3"
lyon_path = "1.0"
lyon_tessellation = "1.0"
palette = "0.7"
pollster = "0.4"
rustybuzz = "0.20"
swash = "0.2.7"
sui = { path = "crates/sui" }
sui-animation = { path = "crates/sui-animation" }
sui-avif = { path = "crates/sui-avif" }
sui-debug = { path = "crates/sui-debug" }
sui-core = { path = "crates/sui-core" }
sui-dev = { path = "crates/sui-dev" }
sui-layout = { path = "crates/sui-layout" }
sui-lucide = { path = "crates/sui-lucide" }
sui-platform = { path = "crates/sui-platform" }
sui-text = { path = "crates/sui-text" }
sui-testing = { path = "crates/sui-testing" }
sui-tui = { path = "crates/sui-tui" }
sui-widget-book = { path = "crates/sui-widget-book" }
sui-widgets = { path = "crates/sui-widgets" }
sui-render-wgpu = { path = "crates/sui-render-wgpu" }
sui-runtime = { path = "crates/sui-runtime" }
sui-scene = { path = "crates/sui-scene" }
tiny-skia = "0.11"
unicode-segmentation = "1.12"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = "0.3"
web-time = "1"
ttf-parser = "0.25"
wgpu = "29.0.1"
winit = "0.30.13"
