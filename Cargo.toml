[workspace]
resolver = "3"

members = [
    "crates/*",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.90"
version = "0.1.0"

[profile.release]
opt-level = 2
panic = "abort"

[profile.dev]

[profile.dev.package."*"]
opt-level = 2

[workspace.dependencies]
bytemuck = { version = "1", features = ["derive"] }
fontdb = "0.23"
lyon_path = "1.0"
lyon_tessellation = "1.0"
palette = "0.7"
pollster = "0.4"
rustybuzz = "0.20"
sui = { path = "crates/sui" }
sui-debug = { path = "crates/sui-debug" }
sui-core = { path = "crates/sui-core" }
sui-dev = { path = "crates/sui-dev" }
sui-layout = { path = "crates/sui-layout" }
sui-platform = { path = "crates/sui-platform" }
sui-text = { path = "crates/sui-text" }
sui-testing = { path = "crates/sui-testing" }
sui-widget-book = { path = "crates/sui-widget-book" }
sui-widgets = { path = "crates/sui-widgets" }
sui-render-wgpu = { path = "crates/sui-render-wgpu" }
sui-runtime = { path = "crates/sui-runtime" }
sui-scene = { path = "crates/sui-scene" }
ttf-parser = "0.25"
wgpu = "29.0.1"
winit = "0.30.13"
