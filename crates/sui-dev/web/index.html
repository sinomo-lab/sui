<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SUI Dev (Web)</title>
    <base data-trunk-public-url />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0f1720;
        color: #e5eef8;
        font-family: system-ui, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      main {
        flex: 1;
        display: flex;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
    <link
      data-trunk
      rel="rust"
      href="../Cargo.toml"
      data-cargo-no-default-features
      data-cargo-features="web"
    />
  </head>
  <body>
    <header>SUI Dev (WebAssembly)</header>
    <main></main>
  </body>
</html>
