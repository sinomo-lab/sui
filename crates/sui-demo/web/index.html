<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SUI Demo (Web)</title>
    <base data-trunk-public-url />
    <link id="sui-window-icon" rel="icon" type="image/svg+xml" href="sui-logo.svg" />
    <link data-trunk rel="copy-file" href="../../sui-runtime/assets/sui-logo.svg" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-width: 100vw;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        background: #0f1720;
        color: #e5eef8;
        font-family: system-ui, sans-serif;
      }

      main {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

    </style>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const queryValue = (name) => (params.get(name) || "").toLowerCase();
        const mediaMatches = (query) =>
          typeof matchMedia === "function" && matchMedia(query).matches;
        const forceSdr =
          queryValue("color-management") === "force-sdr" ||
          queryValue("dynamic-range") === "sdr" ||
          queryValue("dynamic-range") === "standard" ||
          queryValue("canvas-format") === "rgba8unorm-srgb" ||
          queryValue("canvas-tone-mapping") === "standard";
        const explicitSrgbCanvas =
          queryValue("canvas-color-space") === "srgb" ||
          queryValue("output-primaries") === "srgb";

        const wantsWideGamut =
          !forceSdr &&
          !explicitSrgbCanvas &&
          (queryValue("canvas-color-space") === "display-p3" ||
            queryValue("output-primaries") === "display-p3" ||
            queryValue("output-primaries") === "p3" ||
            queryValue("color-management") === "prefer-wide-gamut" ||
            queryValue("color-management") === "prefer-hdr" ||
            mediaMatches("(color-gamut: p3)") ||
            mediaMatches("(color-gamut: rec2020)"));

        const wantsHdr =
          !forceSdr &&
          (queryValue("canvas-format") === "rgba16float" ||
            queryValue("canvas-format") === "float16" ||
            queryValue("canvas-format") === "hdr" ||
            queryValue("canvas-tone-mapping") === "extended" ||
            queryValue("canvas-tone-mapping") === "hdr" ||
            queryValue("dynamic-range") === "hdr" ||
            queryValue("dynamic-range") === "high" ||
            queryValue("color-management") === "prefer-hdr" ||
            mediaMatches("(dynamic-range: high)"));

        window.__suiWebGpuCanvasPreferences = {
          wantsWideGamut,
          wantsHdr,
        };

        const patchConfigure = (context, ownerWindow) => {
          if (!context || context.__suiColorConfigurePatched) {
            return context;
          }

          const configure = context.configure;
          if (typeof configure !== "function") {
            return context;
          }

          Object.defineProperty(context, "__suiColorConfigurePatched", {
            value: true,
          });

          context.configure = function (configuration) {
            const preferences = ownerWindow.__suiWebGpuCanvasPreferences || {
              wantsWideGamut: false,
              wantsHdr: false,
            };
            const next = { ...configuration };

            if (preferences.wantsWideGamut && !preferences.wantsHdr) {
              next.colorSpace = "display-p3";
            }

            if (preferences.wantsHdr && configuration.format === "rgba16float") {
              next.toneMapping = { mode: "extended" };
            }

            ownerWindow.__suiWebGpuCanvasConfiguration = next;
            if (!ownerWindow.__suiLoggedWebGpuCanvasConfiguration) {
              ownerWindow.__suiLoggedWebGpuCanvasConfiguration = true;
              console.log(
                "SUI_WEBGPU_CANVAS_CONFIGURATION " +
                  JSON.stringify({
                    format: next.format,
                    colorSpace: next.colorSpace,
                    toneMapping: next.toneMapping,
                    alphaMode: next.alphaMode,
                    usage: next.usage,
                  }),
              );
            }

            try {
              return configure.call(this, next);
            } catch (error) {
              ownerWindow.__suiWebGpuCanvasConfigurationError = String(error);
              console.warn(
                "SUI_WEBGPU_CANVAS_CONFIGURATION_ERROR " + String(error),
              );
              return configure.call(this, configuration);
            }
          };

          return context;
        };

        const patchVersion = 3;
        const patchCanvas = (prototype) => {
          if (
            !prototype ||
            prototype.__suiWebGpuGetContextPatchVersion === patchVersion
          ) {
            return;
          }

          const getContext = prototype.getContext;
          if (typeof getContext !== "function") {
            return;
          }

          if (!prototype.__suiWebGpuGetContextPatched) {
            Object.defineProperty(prototype, "__suiWebGpuGetContextPatched", {
              value: true,
            });
          }
          Object.defineProperty(prototype, "__suiWebGpuGetContextPatchVersion", {
            value: patchVersion,
            configurable: true,
          });

          prototype.getContext = function (contextId, ...args) {
            const context = getContext.call(this, contextId, ...args);
            const ownerWindow = this.ownerDocument?.defaultView || window;
            return contextId === "webgpu"
              ? patchConfigure(context, ownerWindow)
              : context;
          };
        };

        patchCanvas(window.HTMLCanvasElement?.prototype);
        patchCanvas(window.OffscreenCanvas?.prototype);
      })();
    </script>
    <script>
      (() => {
        const SemanticDomMode = Object.freeze({
          Off: "off",
          Accessibility: "accessibility",
          Automation: "automation",
          Debug: "debug",
        });
        const validModes = new Set(Object.values(SemanticDomMode));
        const params = new URLSearchParams(window.location.search);
        const truthy = (value) =>
          /^(1|true|yes|on)$/i.test(String(value || ""));
        const falsy = (value) =>
          /^(0|false|no|off|none|canvas|canvas-only)$/i.test(
            String(value || ""),
          );
        const parseMode = () => {
          if (
            truthy(params.get("canvas-only")) ||
            truthy(params.get("sui-canvas-only"))
          ) {
            return SemanticDomMode.Off;
          }

          const raw =
            params.get("semantic-dom") ?? params.get("sui-semantic-dom");
          if (raw == null || raw === "") {
            return SemanticDomMode.Accessibility;
          }
          const normalized = raw.toLowerCase();
          if (falsy(normalized)) {
            return SemanticDomMode.Off;
          }
          return validModes.has(normalized)
            ? normalized
            : SemanticDomMode.Accessibility;
        };

        const mode = parseMode();
        const debugRequested = truthy(params.get("sui-debug"));
        window.SemanticDomMode = SemanticDomMode;
        window.__suiSemanticDomMode = mode;
        window.__suiDebugEnabled = debugRequested;

        if (mode === SemanticDomMode.Off) {
          return;
        }

        const automationEnabled =
          debugRequested ||
          mode === SemanticDomMode.Automation ||
          mode === SemanticDomMode.Debug;
        const domPointerForwardingEnabled =
          mode === SemanticDomMode.Automation;
        const debugEnabled = mode === SemanticDomMode.Debug;
        const state = {
          mode,
          snapshot: null,
          frameIndex: null,
          viewport: null,
          devicePixelRatio: window.devicePixelRatio || 1,
          diagnostics: null,
          nodes: [],
          commands: [],
          waiters: [],
          elements: new Map(),
          labels: new Map(),
          mirror: null,
          pendingMirrorUpdate: false,
          mirrorUpdateCount: 0,
          fullSnapshotCount: 0,
          reusedSnapshotCount: 0,
        };

        window.__suiInteropState = state;

        const clone = (value) =>
          value == null ? value : JSON.parse(JSON.stringify(value));
        const formatValueNumber = (value) =>
          Number.isFinite(Number(value)) ? String(Number(value)) : "";
        const valueText = (node) => {
          if (node?.value?.kind === "text") {
            return node.value.text || "";
          }
          if (node?.value?.kind === "number") {
            return formatValueNumber(node.value.number);
          }
          if (node?.value?.kind === "range") {
            return formatValueNumber(node.value.value);
          }
          return "";
        };
        const valueNumber = (node) =>
          node?.value?.kind === "number" && Number.isFinite(Number(node.value.number))
            ? Number(node.value.number)
            : null;
        const valueRange = (node) =>
          node?.value?.kind === "range" ? node.value : null;
        const nodeLabel = (node) =>
          node?.name || valueText(node) || node?.description || node?.role || "";
        const normalizeRole = (role) =>
          String(role || "").replace(/[\s_-]/g, "").toLowerCase();
        const command = (type, node, extra = {}) => ({
          type,
          id: Number(node.id),
          role: node.role || null,
          name: nodeLabel(node) || null,
          ...extra,
        });
        let wakeQueued = false;
        const wakeRuntime = () => {
          const canvas = document.getElementById("sui-main-canvas");
          if (!canvas) {
            return;
          }
          const rect = canvas.getBoundingClientRect();
          try {
            window.dispatchEvent(new Event("resize"));
          } catch (_) {}
          try {
            canvas.dispatchEvent(
              new PointerEvent("pointermove", {
                bubbles: true,
                cancelable: true,
                clientX: rect.left,
                clientY: rect.top,
                pointerId: 1,
                pointerType: "mouse",
                isPrimary: true,
                button: 0,
                buttons: 0,
              }),
            );
          } catch (_) {}
          try {
            canvas.dispatchEvent(
              new MouseEvent("mousemove", {
                bubbles: true,
                cancelable: true,
                clientX: rect.left,
                clientY: rect.top,
              }),
            );
          } catch (_) {}
        };

        const enqueue = (nextCommand) => {
          state.commands.push(nextCommand);
          window.__suiLastCommandAt = performance.now();
          if (!wakeQueued) {
            wakeQueued = true;
            wakeRuntime();
            window.setTimeout(() => {
              wakeQueued = false;
              wakeRuntime();
            }, 0);
          }
        };

        window.__suiEnqueueCommand = enqueue;
        window.__suiDrainCommands = () => state.commands.splice(0);

        const findNodes = (selector = {}) => {
          const snapshot = state.snapshot;
          if (!snapshot?.nodes) {
            return [];
          }
          const selectorRole = selector.role == null ? null : normalizeRole(selector.role);
          const selectorName =
            selector.name == null ? null : String(selector.name).toLowerCase();
          const selectorId = selector.id == null ? null : Number(selector.id);
          return snapshot.nodes.filter((node) => {
            if (selectorId != null && Number(node.id) !== selectorId) {
              return false;
            }
            if (selectorRole != null && normalizeRole(node.role) !== selectorRole) {
              return false;
            }
            if (
              selectorName != null &&
              !nodeLabel(node).toLowerCase().includes(selectorName)
            ) {
              return false;
            }
            return true;
          });
        };

        const requireNode = (selector) => {
          const matches = findNodes(selector);
          if (matches.length === 0) {
            throw new Error(`No SUI semantics node matches ${JSON.stringify(selector)}`);
          }
          return matches[0];
        };

        const waitForIdle = (timeoutMs = 2000) =>
          new Promise((resolve) => {
            const finish = () => resolve(clone(state.snapshot));
            if (state.snapshot) {
              requestAnimationFrame(() => requestAnimationFrame(finish));
              return;
            }
            const timeout = window.setTimeout(finish, timeoutMs);
            state.waiters.push(() => {
              window.clearTimeout(timeout);
              requestAnimationFrame(finish);
            });
          });

        const waitForNextFrame = (previousFrame = state.frameIndex) =>
          new Promise((resolve) => {
            const timeout = window.setTimeout(
              () => resolve(clone(state.snapshot)),
              2000,
            );
            state.waiters.push(() => {
              if (state.frameIndex === previousFrame) {
                state.waiters.push(() => {
                  window.clearTimeout(timeout);
                  resolve(clone(state.snapshot));
                });
              } else {
                window.clearTimeout(timeout);
                resolve(clone(state.snapshot));
              }
            });
          });

        const elementKind = (node) => {
          if (node.dom?.tag) return node.dom.tag;
          if (node.role === "Button") return "button";
          if (node.role === "Link") return "a";
          if (node.role === "TextInput") {
            return node.editableText?.multiline ? "textarea" : "input";
          }
          if (node.role === "CheckBox" || node.role === "RadioButton") {
            return "input";
          }
          if (node.role === "Switch") return "button";
          if (node.role === "Slider") return "input";
          if (node.role === "Text") return "span";
          return "div";
        };

        const ariaRole = (node, element) => {
          if (node.dom && "role" in node.dom) {
            return node.dom.role;
          }
          const nativeTag = element.localName;
          if (node.role === "Button" && nativeTag === "button") return null;
          if (node.role === "Link" && nativeTag === "a") return null;
          if (node.role === "TextInput") return null;
          if (node.role === "CheckBox" && nativeTag === "input") return null;
          if (node.role === "RadioButton" && nativeTag === "input") return null;
          if (node.role === "Slider" && nativeTag === "input") return null;

          return {
            Window: "main",
            Root: "group",
            GenericContainer: "group",
            Separator: "separator",
            List: "list",
            ListItem: "listitem",
            Tree: "tree",
            Table: "table",
            Splitter: "separator",
            Breadcrumb: "navigation",
            TabBar: "tablist",
            Tabs: "group",
            Switch: "switch",
            RadioGroup: "radiogroup",
            Menu: "menu",
            MenuItem: "menuitem",
            ContextMenu: "menu",
            Tooltip: "tooltip",
            Dialog: "dialog",
            Popover: "dialog",
            ProgressBar: "progressbar",
            BusyIndicator: "status",
            Image: "img",
            ColorSwatch: "img",
            ColorPicker: "button",
            Canvas: "img",
            ScrollView: "region",
            ComboBox: "combobox",
            SpinBox: "spinbutton",
          }[node.role] || null;
        };

        const interactiveRoles = [
            "Button",
            "Link",
            "CheckBox",
            "Switch",
            "RadioButton",
            "MenuItem",
            "Slider",
            "TextInput",
            "SpinBox",
            "ComboBox",
            "ColorPicker",
            "ScrollView",
          ];
        const interactiveActions = [
          "Activate",
          "SetValue",
          "SetSelection",
          "Increment",
          "Decrement",
          "InsertText",
        ];
        const hasInteractiveAction = (node) =>
          Array.isArray(node?.actions) &&
          node.actions.some((action) => interactiveActions.includes(action));
        const isInteractive = (node) =>
          node.dom?.interactive ??
          (interactiveRoles.includes(node.role) || hasInteractiveAction(node));
        const semanticNodeKey = (id) => (id == null ? null : String(id));
        const computeSemanticNodeDepths = (nodes) => {
          const byId = new Map();
          const depths = new Map();
          const visiting = new Set();

          for (const node of nodes) {
            byId.set(semanticNodeKey(node.id), node);
          }

          const depthFor = (node) => {
            const key = semanticNodeKey(node.id);
            if (depths.has(key)) {
              return depths.get(key);
            }
            if (visiting.has(key)) {
              return 0;
            }

            visiting.add(key);
            const parent = byId.get(semanticNodeKey(node.parent));
            const depth = parent ? depthFor(parent) + 1 : 0;
            visiting.delete(key);
            depths.set(key, depth);
            return depth;
          };

          for (const node of nodes) {
            depthFor(node);
          }

          return depths;
        };
        const semanticStackIndex = (node, index, depths) => {
          const depth = depths.get(semanticNodeKey(node.id)) || 0;
          return depth * 100000 + index;
        };
        const pointerTransparentRoles = new Set(["Text"]);
        const receivesDomPointerEvents = (node) =>
          domPointerForwardingEnabled &&
          !Boolean(node.state?.hidden) &&
          !pointerTransparentRoles.has(node.role);
        const setStyle = (element, property, value) => {
          if (element.style[property] !== value) {
            element.style[property] = value;
          }
        };
        const setAttribute = (element, name, value) => {
          if (value == null || value === "") {
            if (element.hasAttribute(name)) {
              element.removeAttribute(name);
            }
          } else if (element.getAttribute(name) !== String(value)) {
            element.setAttribute(name, String(value));
          }
        };
        const setTextContent = (element, value) => {
          if (element.textContent !== value) {
            element.textContent = value;
          }
        };
        const valueIsVisibleControlContent = (node) =>
          ["ComboBox", "SpinBox", "Slider", "ProgressBar", "TextInput"].includes(
            node.role,
          );
        const exposesAriaValue = (node) =>
          ["ComboBox", "SpinBox", "Slider", "ProgressBar"].includes(node.role);
        const visibleContentText = (node, label) =>
          node.role === "ColorPicker"
            ? ""
            : valueIsVisibleControlContent(node)
              ? valueText(node)
              : label;
        const elementId = (nodeId) => `sui-semantic-dom-node-${nodeId}`;
        const labelId = (nodeId) => `sui-semantic-dom-label-${nodeId}`;
        const needsAssociatedLabel = (node) =>
          [
            "CheckBox",
            "Switch",
            "RadioButton",
            "Slider",
            "TextInput",
            "SpinBox",
            "ComboBox",
            "ColorPicker",
          ].includes(node.role);
        const configureHiddenLabel = (labelElement) => {
          labelElement.hidden = true;
          Object.assign(labelElement.style, {
            display: "none",
          });
        };
        const ensureAssociatedLabel = (mirror, key, element, node, label) => {
          const shouldLabel = needsAssociatedLabel(node) && label;
          let labelElement = state.labels.get(key);
          if (!shouldLabel) {
            labelElement?.remove();
            state.labels.delete(key);
            setAttribute(element, "aria-labelledby", null);
            return;
          }

          if (!labelElement || !labelElement.isConnected) {
            labelElement = document.createElement("label");
            configureHiddenLabel(labelElement);
            state.labels.set(key, labelElement);
          }

          const id = elementId(key);
          element.id = id;
          labelElement.id = labelId(key);
          labelElement.htmlFor = id;
          setTextContent(labelElement, label);
          setAttribute(element, "aria-labelledby", labelElement.id);
          setAttribute(element, "aria-label", null);
          if (labelElement.parentNode !== mirror) {
            mirror.appendChild(labelElement);
          }
        };
        const canvasEventCoordinates = (_canvas, event) => {
          // Winit derives offsetX/offsetY from CSS-pixel client coordinates
          // and applies the window scale factor itself.
          return {
            clientX: event.clientX,
            clientY: event.clientY,
            screenX: event.screenX,
            screenY: event.screenY,
          };
        };
        const canvasEventOffsets = (canvas, event) => {
          const rect = canvas.getBoundingClientRect();
          return {
            offsetX: event.clientX - rect.left,
            offsetY: event.clientY - rect.top,
          };
        };
        const ensureCoalescedPointerMove = (event) => {
          if (
            event.type !== "pointermove" ||
            typeof event.getCoalescedEvents !== "function"
          ) {
            return;
          }
          try {
            // Winit drops pointer moves when coalescing is supported but empty.
            const coalesced = [event];
            Object.defineProperty(event, "getCoalescedEvents", {
              configurable: true,
              value: () => coalesced,
            });
          } catch (_) {
          }
        };
        const dispatchCanvasEvent = (canvas, event, sourceEvent) => {
          const offsets = canvasEventOffsets(canvas, sourceEvent);
          try {
            Object.defineProperties(event, {
              offsetX: {
                configurable: true,
                value: offsets.offsetX,
              },
              offsetY: {
                configurable: true,
                value: offsets.offsetY,
              },
            });
          } catch (_) {
          }
          ensureCoalescedPointerMove(event);
          canvas.dispatchEvent(event);
        };
        const clonePointerEventInit = (event, canvas) => ({
          bubbles: true,
          cancelable: true,
          composed: true,
          pointerId: event.pointerId,
          pointerType: event.pointerType,
          isPrimary: event.isPrimary,
          ...canvasEventCoordinates(canvas, event),
          button: event.button,
          buttons: event.buttons,
          pressure: event.pressure,
          tangentialPressure: event.tangentialPressure,
          tiltX: event.tiltX,
          tiltY: event.tiltY,
          twist: event.twist,
          width: event.width,
          height: event.height,
          altKey: event.altKey,
          ctrlKey: event.ctrlKey,
          metaKey: event.metaKey,
          shiftKey: event.shiftKey,
        });
        const cloneMouseEventInit = (event, canvas, overrides = {}) => ({
          bubbles: true,
          cancelable: true,
          composed: true,
          ...canvasEventCoordinates(canvas, event),
          button: event.button,
          buttons: event.buttons,
          altKey: event.altKey,
          ctrlKey: event.ctrlKey,
          metaKey: event.metaKey,
          shiftKey: event.shiftKey,
          ...overrides,
        });
        const mouseEventTypeForPointer = (type) => {
          switch (type) {
            case "pointerdown":
              return "mousedown";
            case "pointermove":
              return "mousemove";
            case "pointerup":
              return "mouseup";
            default:
              return null;
          }
        };
        const dispatchMouseEventToCanvas = (
          canvas,
          event,
          type = mouseEventTypeForPointer(event.type),
          overrides = {},
        ) => {
          if (!type) {
            return false;
          }
          dispatchCanvasEvent(
            canvas,
            new MouseEvent(type, cloneMouseEventInit(event, canvas, overrides)),
            event,
          );
          return true;
        };
        const forwardPointerEventToCanvas = (event) => {
          const canvas = document.getElementById("sui-main-canvas");
          if (!canvas) {
            return false;
          }
          let forwarded = false;
          try {
            dispatchCanvasEvent(
              canvas,
              new PointerEvent(event.type, clonePointerEventInit(event, canvas)),
              event,
            );
            forwarded = true;
          } catch (_) {
          }
          try {
            forwarded = dispatchMouseEventToCanvas(canvas, event) || forwarded;
          } catch (_) {
          }
          return forwarded;
        };
        const forwardWheelEventToCanvas = (event) => {
          const canvas = document.getElementById("sui-main-canvas");
          if (!canvas) {
            return false;
          }
          try {
            dispatchMouseEventToCanvas(canvas, event, "mousemove", {
              button: 0,
              buttons: event.buttons || 0,
            });
            dispatchCanvasEvent(
              canvas,
              new WheelEvent("wheel", {
                bubbles: true,
                cancelable: true,
                composed: true,
                ...canvasEventCoordinates(canvas, event),
                deltaX: event.deltaX,
                deltaY: event.deltaY,
                deltaZ: event.deltaZ,
                deltaMode: event.deltaMode,
                altKey: event.altKey,
                ctrlKey: event.ctrlKey,
                metaKey: event.metaKey,
                shiftKey: event.shiftKey,
              }),
              event,
            );
            return true;
          } catch (_) {
            return false;
          }
        };

        const ensureMirror = () => {
          if (state.mirror?.isConnected) {
            return state.mirror;
          }
          if (!document.body) {
            return null;
          }

          let mirror = document.getElementById("sui-semantic-dom-mirror");
          if (!mirror) {
            mirror = document.createElement("div");
            mirror.id = "sui-semantic-dom-mirror";
            document.body.appendChild(mirror);
          }
          state.mirror = mirror;
          Object.assign(mirror.style, {
            position: "fixed",
            inset: "0",
            zIndex: "2",
            pointerEvents: "none",
            overflow: "hidden",
            contain: "layout style paint",
          });
          if (automationEnabled) {
            mirror.setAttribute("data-sui-dom-mirror", mode);
          } else {
            mirror.removeAttribute("data-sui-dom-mirror");
          }

          const canvas = document.getElementById("sui-main-canvas");
          if (canvas) {
            canvas.setAttribute("role", "presentation");
            canvas.setAttribute("aria-label", "");
          }
          return mirror;
        };

        const createElement = (node) => {
          const element = document.createElement(elementKind(node));
          element.__suiNodeId = Number(node.id);
          element.__suiKind = elementKind(node);
          Object.assign(element.style, {
            position: "absolute",
            boxSizing: "border-box",
            margin: "0",
            padding: "0",
            border: debugEnabled ? "1px solid #ff4d8d" : "0",
            borderRadius: "0",
            background: "transparent",
            color: debugEnabled ? "#ff4d8d" : "transparent",
            opacity: debugEnabled ? "1" : "0",
            font: "inherit",
            overflow: "hidden",
            resize: "none",
          });
          for (const type of ["pointerdown", "pointermove", "pointerup", "pointercancel"]) {
            element.addEventListener(
              type,
              (event) => {
                if (type === "pointerdown") {
                  element.__suiLastPointerAt = performance.now();
                }
                if (forwardPointerEventToCanvas(event)) {
                  event.preventDefault();
                  event.stopPropagation();
                }
              },
              { passive: false },
            );
          }
          element.addEventListener("focus", () => {
            const pointerAge = performance.now() - (element.__suiLastPointerAt || 0);
            if (pointerAge > 200 && isInteractive({ role: element.__suiRole })) {
              window.__suiEnqueueCommand?.(command("click", { id: element.__suiNodeId }));
            }
          });
          element.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            const pointerAge = performance.now() - (element.__suiLastPointerAt || 0);
            if (pointerAge <= 700) {
              return;
            }
            window.__suiEnqueueCommand?.(command("click", { id: element.__suiNodeId }));
          });
          element.addEventListener("keydown", (event) => {
            if (event.isComposing) {
              return;
            }
            window.__suiEnqueueCommand?.(
              command("key", { id: element.__suiNodeId }, { key: event.key }),
            );
          });
          element.addEventListener("input", () => {
            if (element.__suiRole !== "TextInput") {
              return;
            }
            const previous = element.__suiValue || "";
            const next = "value" in element ? element.value : "";
            element.__suiValue = next;
            const inserted = next.startsWith(previous)
              ? next.slice(previous.length)
              : next;
            if (inserted) {
              window.__suiEnqueueCommand?.(
                command("text", { id: element.__suiNodeId }, { text: inserted }),
              );
            }
          });
          element.addEventListener(
            "wheel",
            (event) => {
              event.preventDefault();
              event.stopPropagation();
              if (!forwardWheelEventToCanvas(event)) {
                window.__suiEnqueueCommand?.(
                  command("scroll", { id: element.__suiNodeId }, {
                    deltaX: event.deltaX,
                    deltaY: event.deltaY,
                  }),
                );
              }
            },
            { passive: false },
          );
          return element;
        };

        const configureElement = (
          mirror,
          key,
          element,
          node,
          canvasRect,
          stackIndex,
        ) => {
          const bounds = node.bounds || { x: 0, y: 0, width: 0, height: 0 };
          const label = nodeLabel(node);
          const role = ariaRole(node, element);
          const hidden = Boolean(node.state?.hidden);
          const disabled = Boolean(node.state?.disabled);
          const checked = node.state?.checked;
          const expanded = node.state?.expanded;
          const selected = Boolean(node.state?.selected);
          const number = valueNumber(node);
          const range = valueRange(node);
          const value = valueText(node);

          element.__suiNodeId = Number(node.id);
          element.__suiRole = node.role;
          element.__suiName = label;
          element.__suiValue = value;
          element.hidden = hidden;
          if ("disabled" in element) {
            element.disabled = disabled;
          } else {
            element.toggleAttribute("disabled", disabled);
          }
          if (disabled) {
            setAttribute(element, "aria-disabled", "true");
          } else {
            setAttribute(element, "aria-disabled", null);
          }
          setStyle(element, "left", `${canvasRect.left + bounds.x}px`);
          setStyle(element, "top", `${canvasRect.top + bounds.y}px`);
          setStyle(element, "width", `${Math.max(1, bounds.width)}px`);
          setStyle(element, "height", `${Math.max(1, bounds.height)}px`);
          setStyle(
            element,
            "pointerEvents",
            receivesDomPointerEvents(node) ? "auto" : "none",
          );
          setStyle(element, "zIndex", String(stackIndex));

          if (automationEnabled) {
            element.dataset.suiId = String(node.id);
            element.dataset.suiRole = node.role;
            element.dataset.suiName = label;
            element.dataset.suiValue = value;
            element.dataset.suiFocused = node.state?.focused ? "true" : "false";
          } else {
            delete element.dataset.suiId;
            delete element.dataset.suiRole;
            delete element.dataset.suiName;
            delete element.dataset.suiValue;
            delete element.dataset.suiFocused;
          }

          if (role) {
            setAttribute(element, "role", role);
          } else {
            setAttribute(element, "role", null);
          }
          setAttribute(element, "aria-label", label);
          ensureAssociatedLabel(mirror, key, element, node, label);
          setAttribute(element, "title", node.description);
          if (checked) {
            setAttribute(element, "aria-checked", checked === "checked" ? "true" : checked);
          } else {
            setAttribute(element, "aria-checked", null);
          }
          if (expanded == null) {
            setAttribute(element, "aria-expanded", null);
          } else {
            setAttribute(element, "aria-expanded", String(Boolean(expanded)));
          }
          if (selected) {
            setAttribute(element, "aria-selected", "true");
          } else {
            setAttribute(element, "aria-selected", null);
          }
          if (exposesAriaValue(node) && range) {
            setAttribute(element, "aria-valuemin", range.min);
            setAttribute(element, "aria-valuemax", range.max);
            setAttribute(element, "aria-valuenow", range.value);
            setAttribute(element, "aria-valuetext", value);
          } else if (exposesAriaValue(node) && number != null) {
            setAttribute(element, "aria-valuemin", null);
            setAttribute(element, "aria-valuemax", null);
            setAttribute(element, "aria-valuenow", number);
            setAttribute(element, "aria-valuetext", value);
          } else if (exposesAriaValue(node) && value) {
            setAttribute(element, "aria-valuemin", null);
            setAttribute(element, "aria-valuemax", null);
            setAttribute(element, "aria-valuenow", null);
            setAttribute(element, "aria-valuetext", value);
          } else {
            setAttribute(element, "aria-valuemin", null);
            setAttribute(element, "aria-valuemax", null);
            setAttribute(element, "aria-valuenow", null);
            setAttribute(element, "aria-valuetext", null);
          }

          if (element.localName === "input") {
            if (node.role === "CheckBox" && element.type !== "checkbox") {
              element.type = "checkbox";
            }
            if (node.role === "RadioButton" && element.type !== "radio") {
              element.type = "radio";
            }
            if (node.role === "Slider") {
              if (element.type !== "range") {
                element.type = "range";
              }
              element.step = "any";
            } else {
              setAttribute(element, "step", null);
            }
            if (node.role === "TextInput" && element.type !== "text") {
              element.type = "text";
            }
            if (node.role === "CheckBox" || node.role === "RadioButton") {
              element.checked = checked === "checked";
            }
            if (node.role === "Slider" && range) {
              element.min = String(range.min);
              element.max = String(range.max);
              element.value = String(range.value);
            }
            if (node.role === "TextInput") {
              if (element.value !== value) {
                element.value = value;
              }
              element.readOnly = Boolean(node.editableText?.readonly);
            }
          } else if (element.localName === "textarea") {
            if (element.value !== value) {
              element.value = value;
            }
            element.readOnly = Boolean(node.editableText?.readonly);
          } else if (element.localName === "a") {
            const href = /^https?:\/\//.test(value) ? value : "#";
            element.href = href;
            setTextContent(element, label);
          } else {
            setTextContent(element, visibleContentText(node, label));
          }

          if (isInteractive(node)) {
            element.tabIndex = 0;
          } else {
            element.tabIndex = -1;
          }
        };

        const updateMirror = () => {
          const mirror = ensureMirror();
          const snapshot = state.snapshot;
          const canvas = document.getElementById("sui-main-canvas");
          if (!mirror || !snapshot || !canvas) {
            return;
          }

          const canvasRect = canvas.getBoundingClientRect();
          const nodes = snapshot.nodes || [];
          const stackDepths = computeSemanticNodeDepths(nodes);
          const activeIds = new Set();
          for (const [index, node] of nodes.entries()) {
            const key = String(node.id);
            activeIds.add(key);
            let element = state.elements.get(key);
            const kind = elementKind(node);
            if (!element || !element.isConnected || element.__suiKind !== kind) {
              element?.remove();
              element = createElement(node);
              state.elements.set(key, element);
            }
            configureElement(
              mirror,
              key,
              element,
              node,
              canvasRect,
              semanticStackIndex(node, index, stackDepths),
            );
            if (element.parentNode !== mirror) {
              mirror.appendChild(element);
            }
          }

          for (const [key, element] of state.elements) {
            if (!activeIds.has(key)) {
              element.remove();
              state.elements.delete(key);
            }
          }
          for (const [key, label] of state.labels) {
            if (!activeIds.has(key)) {
              label.remove();
              state.labels.delete(key);
            }
          }
          state.mirrorUpdateCount += 1;
        };

        const scheduleMirrorUpdate = () => {
          if (state.pendingMirrorUpdate) {
            return;
          }
          state.pendingMirrorUpdate = true;
          requestAnimationFrame(() => {
            state.pendingMirrorUpdate = false;
            updateMirror();
          });
        };

        window.__suiPublishSnapshot = (json) => {
          try {
            const snapshot = typeof json === "string" ? JSON.parse(json) : json;
            if (Array.isArray(snapshot.nodes)) {
              state.nodes = snapshot.nodes;
              state.fullSnapshotCount += 1;
              scheduleMirrorUpdate();
            } else {
              snapshot.nodes = state.nodes;
              state.reusedSnapshotCount += 1;
            }
            state.snapshot = snapshot;
            state.frameIndex = snapshot.frameIndex;
            state.viewport = snapshot.viewport;
            state.devicePixelRatio =
              snapshot.devicePixelRatio || window.devicePixelRatio || 1;
            state.diagnostics = snapshot.performance || null;
            const waiters = state.waiters.splice(0);
            for (const waiter of waiters) {
              waiter();
            }
          } catch (error) {
            console.warn("SUI_SEMANTIC_DOM_SNAPSHOT_ERROR " + String(error));
          }
        };

        const screenshotNode = async (selector = {}) => {
          await waitForIdle();
          const node = requireNode(selector);
          const canvas = document.getElementById("sui-main-canvas");
          if (!canvas) {
            throw new Error("SUI canvas is not available");
          }
          const bounds = node.bounds;
          const dpr = state.devicePixelRatio || window.devicePixelRatio || 1;
          const x = Math.max(0, Math.floor(bounds.x * dpr));
          const y = Math.max(0, Math.floor(bounds.y * dpr));
          const width = Math.max(1, Math.ceil(bounds.width * dpr));
          const height = Math.max(1, Math.ceil(bounds.height * dpr));
          const output = document.createElement("canvas");
          output.width = width;
          output.height = height;
          const context = output.getContext("2d");
          context.drawImage(canvas, x, y, width, height, 0, 0, width, height);
          return output.toDataURL("image/png");
        };

        const api = {
          get mode() {
            return mode;
          },
          ready: waitForIdle,
          waitForIdle,
          snapshot: () => clone(state.snapshot),
          find: (selector = {}) => findNodes(selector).map(clone),
        };

        if (automationEnabled) {
          api.click = async (selector = {}) => {
            const node = requireNode(selector);
            const previousFrame = state.frameIndex;
            enqueue(command("click", node));
            return waitForNextFrame(previousFrame);
          };
          api.scroll = async (selector = {}, deltaX = 0, deltaY = 0) => {
            const node = requireNode(selector);
            const previousFrame = state.frameIndex;
            enqueue(command("scroll", node, { deltaX, deltaY }));
            return waitForNextFrame(previousFrame);
          };
          api.press = async (selector = {}, key = "") => {
            const node = requireNode(selector);
            const previousFrame = state.frameIndex;
            enqueue(command("key", node, { key }));
            return waitForNextFrame(previousFrame);
          };
          api.fill = async (selector = {}, text = "") => {
            const node = requireNode(selector);
            const previousFrame = state.frameIndex;
            enqueue(command("text", node, { text }));
            return waitForNextFrame(previousFrame);
          };
          api.screenshot = screenshotNode;
          window.__sui = api;
        }

        window.addEventListener("resize", scheduleMirrorUpdate);
        document.addEventListener("DOMContentLoaded", scheduleMirrorUpdate, { once: true });
      })();
    </script>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const benchmark = params.get("benchmark");
        if (!benchmark) {
          return;
        }

        const clamp = (value, min, max, fallback) => {
          const parsed = Number.parseInt(value ?? "", 10);
          if (!Number.isFinite(parsed)) {
            return fallback;
          }
          return Math.min(max, Math.max(min, parsed));
        };

        const warmupFrames = clamp(params.get("warmup"), 0, 2000, 60);
        const measuredFrames = clamp(params.get("frames"), 1, 10000, 180);

        const percentile = (values, ratio) => {
          if (!values.length) return 0;
          const sorted = [...values].sort((a, b) => a - b);
          const index = Math.min(sorted.length - 1, Math.floor(sorted.length * ratio));
          return sorted[index];
        };

        const finalize = (samples, startedAt) => {
          const canvas = document.getElementById("sui-main-canvas");
          const canvasMetrics = canvas
            ? {
                width: canvas.width,
                height: canvas.height,
                clientWidth: canvas.clientWidth,
                clientHeight: canvas.clientHeight,
              }
            : null;
          const canvasConfiguration = window.__suiWebGpuCanvasConfiguration
            ? {
                format: window.__suiWebGpuCanvasConfiguration.format,
                colorSpace: window.__suiWebGpuCanvasConfiguration.colorSpace,
                toneMapping:
                  window.__suiWebGpuCanvasConfiguration.toneMapping ?? null,
                configurationError:
                  window.__suiWebGpuCanvasConfigurationError ?? null,
              }
            : null;
          const totalMs = samples.reduce((sum, value) => sum + value, 0);
          const avgMs = totalMs / samples.length;
          const minMs = Math.min(...samples);
          const maxMs = Math.max(...samples);
          const p95Ms = percentile(samples, 0.95);
          const result = {
            benchmark,
            warmupFrames,
            measuredFrames: samples.length,
            wallClockMs: Number((performance.now() - startedAt).toFixed(2)),
            avgFrameMs: Number(avgMs.toFixed(3)),
            minFrameMs: Number(minMs.toFixed(3)),
            maxFrameMs: Number(maxMs.toFixed(3)),
            p95FrameMs: Number(p95Ms.toFixed(3)),
            avgFps: Number((1000 / avgMs).toFixed(2)),
            p95Fps: Number((1000 / p95Ms).toFixed(2)),
            canvasMetrics,
            canvasConfiguration,
          };
          window.__suiBenchmarkResult = result;
          console.log("SUI_BENCHMARK_RESULT " + JSON.stringify(result));
        };

        window.addEventListener(
          "TrunkApplicationStarted",
          () => {
            const deltas = [];
            let previous = null;
            let frame = 0;
            const startedAt = performance.now();

            const tick = (timestamp) => {
              if (previous !== null) {
                if (frame >= warmupFrames) {
                  deltas.push(timestamp - previous);
                }
              }
              previous = timestamp;
              frame += 1;

              if (deltas.length >= measuredFrames) {
                finalize(deltas, startedAt);
                return;
              }

              requestAnimationFrame(tick);
            };

            requestAnimationFrame(tick);
          },
          { once: true },
        );
      })();
    </script>
    <script>
      (() => {
        const canvasId = "sui-main-canvas";
        const rootId = "sui-root";
        let pending = false;
        let installed = false;
        let lastMetrics = null;
        let resizeObserver = null;
        let observedResizeTargets = new Set();

        const positive = (value, fallback = 1) => {
          const number = Number(value);
          return Number.isFinite(number) && number > 0 ? number : fallback;
        };

        const measuredBox = (element, fallbackWidth, fallbackHeight) => {
          if (!element) {
            return {
              width: positive(fallbackWidth),
              height: positive(fallbackHeight),
            };
          }

          const rect = element.getBoundingClientRect();
          const width = positive(
            rect.width || element.clientWidth,
            fallbackWidth,
          );
          const height = positive(
            rect.height || element.clientHeight,
            fallbackHeight,
          );
          return { width, height };
        };

        const isDocumentSizingElement = (element) =>
          element === document.body || element === document.documentElement;

        const explicitResizeContainer = (canvas) => {
          let element = canvas;
          while (element) {
            if (
              typeof element.hasAttribute === "function" &&
              element.hasAttribute("data-sui-resize-container")
            ) {
              return element;
            }
            element = element.parentElement;
          }
          return null;
        };

        const hostContainerForCanvas = (canvas) => {
          const explicit = explicitResizeContainer(canvas);
          if (explicit) {
            return explicit;
          }

          const root = document.getElementById(rootId) || canvas.parentElement;
          if (!root) {
            return canvas;
          }

          const parent = root.parentElement;
          if (parent && !isDocumentSizingElement(parent)) {
            const parentBox = measuredBox(parent, 0, 0);
            if (parentBox.width > 0 && parentBox.height > 0) {
              return parent;
            }
          }

          return root;
        };

        const resizeTargetsForCanvas = (canvas) => {
          const root = document.getElementById(rootId) || canvas.parentElement;
          return new Set(
            [hostContainerForCanvas(canvas), root, canvas].filter(Boolean),
          );
        };

        const refreshObservedResizeTargets = (canvas) => {
          if (!resizeObserver) {
            return;
          }

          const nextTargets = resizeTargetsForCanvas(canvas);
          const changed =
            nextTargets.size !== observedResizeTargets.size ||
            [...nextTargets].some((element) => !observedResizeTargets.has(element));
          if (!changed) {
            return;
          }

          resizeObserver.disconnect();
          for (const element of nextTargets) {
            resizeObserver.observe(element);
          }
          observedResizeTargets = nextTargets;
        };

        const readMetrics = () => {
          const canvas = document.getElementById(canvasId);
          if (!canvas) {
            return null;
          }

          const fallbackWidth = window.innerWidth || canvas.clientWidth || 1;
          const fallbackHeight = window.innerHeight || canvas.clientHeight || 1;
          const root = document.getElementById(rootId) || canvas.parentElement;
          const container = hostContainerForCanvas(canvas);
          const containerBox = measuredBox(
            container,
            fallbackWidth,
            fallbackHeight,
          );
          const canvasBox = measuredBox(
            canvas,
            containerBox.width,
            containerBox.height,
          );
          const cssWidth = positive(containerBox.width, canvasBox.width);
          const cssHeight = positive(containerBox.height, canvasBox.height);
          const dpr = positive(window.devicePixelRatio, 1);

          return {
            canvas,
            root,
            container,
            cssWidth,
            cssHeight,
            dpr,
            pixelWidth: Math.max(1, Math.round(cssWidth * dpr)),
            pixelHeight: Math.max(1, Math.round(cssHeight * dpr)),
          };
        };

        const metricsChanged = (metrics) =>
          !lastMetrics ||
          Math.abs(lastMetrics.cssWidth - metrics.cssWidth) > 0.01 ||
          Math.abs(lastMetrics.cssHeight - metrics.cssHeight) > 0.01 ||
          Math.abs(lastMetrics.dpr - metrics.dpr) > 0.001 ||
          lastMetrics.pixelWidth !== metrics.pixelWidth ||
          lastMetrics.pixelHeight !== metrics.pixelHeight;

        const apply = () => {
          pending = false;
          const metrics = readMetrics();
          if (!metrics) {
            return;
          }
          refreshObservedResizeTargets(metrics.canvas);

          const cssWidth = `${metrics.cssWidth}px`;
          const cssHeight = `${metrics.cssHeight}px`;
          const changed = metricsChanged(metrics);
          if (metrics.canvas.style.width !== cssWidth) {
            metrics.canvas.style.width = cssWidth;
          }
          if (metrics.canvas.style.height !== cssHeight) {
            metrics.canvas.style.height = cssHeight;
          }
          if (metrics.canvas.width !== metrics.pixelWidth) {
            metrics.canvas.width = metrics.pixelWidth;
          }
          if (metrics.canvas.height !== metrics.pixelHeight) {
            metrics.canvas.height = metrics.pixelHeight;
          }

          if (!changed) {
            return;
          }

          lastMetrics = {
            cssWidth: metrics.cssWidth,
            cssHeight: metrics.cssHeight,
            dpr: metrics.dpr,
            pixelWidth: metrics.pixelWidth,
            pixelHeight: metrics.pixelHeight,
            containerId: metrics.container.id || "",
            rootId: metrics.root?.id || "",
          };
          window.__suiContainerMetrics = { ...lastMetrics };
          window.dispatchEvent(new Event("resize"));
        };

        const schedule = () => {
          if (pending) {
            return;
          }
          pending = true;
          requestAnimationFrame(apply);
        };

        window.__suiResizeCanvasToContainer = () => {
          lastMetrics = null;
          schedule();
        };

        const install = () => {
          if (installed) {
            return;
          }
          const canvas = document.getElementById(canvasId);
          if (!canvas) {
            requestAnimationFrame(install);
            return;
          }
          installed = true;
          if (typeof ResizeObserver === "function") {
            resizeObserver = new ResizeObserver(schedule);
            refreshObservedResizeTargets(canvas);
            window.__suiContainerResizeObserver = resizeObserver;
          }

          window.addEventListener("resize", schedule);
          window.visualViewport?.addEventListener("resize", schedule);
          schedule();
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", install, { once: true });
        } else {
          install();
        }
      })();
    </script>
  </head>
  <body>
    <main id="sui-root"><canvas id="sui-main-canvas"></canvas></main>
    <link
      data-trunk
      rel="rust"
      href="../Cargo.toml"
      data-cargo-no-default-features
      data-cargo-features="web markdown"
    />
  </body>
